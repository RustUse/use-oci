name: Facade Publish Readiness

"on":
  workflow_dispatch:
    inputs:
      registry-ready:
        description: Confirm that matching focused-crate versions are live on crates.io
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  facade-release-readiness:
    if: ${{ inputs.registry-ready }}
    name: Facade Publish Dry Run
    runs-on: ubuntu-latest
    env:
      FOCUSED_CRATES: >-
        use-oci-digest use-oci-media-type use-oci-annotation use-oci-platform use-oci-tag use-oci-namespace use-oci-hook use-oci-descriptor use-oci-layer use-oci-manifest use-oci-index use-oci-distribution use-oci-reference use-oci-config use-oci-layout use-oci-runtime use-oci-image
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install stable Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: |
            . -> target
      - name: Confirm focused crates are visible on crates.io
        run: |
          for crate in $FOCUSED_CRATES; do
            curl --fail --silent --show-error "https://crates.io/api/v1/crates/${crate}" > /dev/null
          done
      - name: List packaged facade files
        run: cargo package --list -p use-oci
      - name: Dry-run publish use-oci
        run: cargo publish --dry-run --allow-dirty -p use-oci
